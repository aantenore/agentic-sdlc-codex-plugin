name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18.18.0, 20, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm run check
      - run: npm test
      - run: npm run doctor
      - run: npm pack --dry-run

  package:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Verify tag and package version
        shell: bash
        run: |
          test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
      - name: Build package and checksum
        id: package
        shell: bash
        run: |
          archive="$(npm pack)"
          sha256sum "$archive" > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v5
        with:
          name: agentic-sdlc-${{ github.ref_name }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          if-no-files-found: error
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.archive }}.sha256" \
            --generate-notes \
            --verify-tag
